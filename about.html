<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Snap Income Dashboard</title>

  <style>
    html,body{height:100%;margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif}

    .topnav{
      position:fixed; top:0; left:0; right:0;
      height:48px;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 12px;
      background:#fff;
      border-bottom:1px solid #ddd;
      z-index:10;
      box-sizing:border-box;
    }
    .topnav .brand{font-weight:800;font-size:14px}
    .topnav a{
      text-decoration:none;
      color:#222;
      font-weight:700;
      padding:8px 10px;
      border-radius:10px;
    }
    .topnav a:hover{background:#f2f2f2}
    .topnav a.active{background:#111;color:#fff}

    #app{height:100%;display:flex; padding-top:48px; box-sizing:border-box}
    #sidebar{width:340px;padding:12px;border-right:1px solid #ddd;box-sizing:border-box;overflow:auto}
    #map{flex:1}

    h1{font-size:16px;margin:0 0 8px}
    .small{font-size:12px;color:#555;line-height:1.35}
    .divider{height:1px;background:#eee;margin:10px 0}

    /* cards! */
    .card{
      background:#ddd;
      padding:70px 15px;
      border-radius:12px;
      position:relative;
      margin:15px;
    }

    .card-label{
      position:absolute;
      top:3px;
      left:3px;
      background:#111;
      color:white;
      padding:15px 40px;
      border-radius:10px;
      font-weight:600;
      font-size:20px;
      width:125px;
      text-align:center;
    }

    .card p{
      font-size:20px;
      margin-top:20px;
    }
  </style>
</head>

<body>
  <div class="topnav">
    <div class="brand">SNAP Income Dashboard</div>
    <div>
      <a href="index.html">Dashboard</a>
      <a class="active" href="about.html">About</a>
    </div>
  </div>
  <div style="padding:80px 40px; max-width:800px;">

  <div class="container">

    <div class="card">
      <div class="card-label">About Us</div>
      <p>
        About the creators of the dashboard.
      </p>
    </div>

    <div class="card">
      <div class="card-label">Our Goal</div>
      <p>
        What the purpose of the dashboard is.
      </p>
    </div>

    <div class="card">
      <div class="card-label">Methodology</div>
      <p>
        Explain our methodology.
      </p>
    </div>

    <div class="card">
      <div class="card-label">Data Sources</div>
      <p>
        Explain and list data sources.
      </p>
    </div>
    
</div>
</div>
</body>
</html>
